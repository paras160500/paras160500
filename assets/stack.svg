<svg width="900" height="430" viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="1" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d2a26"/><stop offset="1" stop-color="#0a1a22"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1f2e"/><stop offset="1" stop-color="#0a141f"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1530"/><stop offset="1" stop-color="#120e22"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a1610"/><stop offset="1" stop-color="#1a0f0c"/>
    </linearGradient>
  </defs>

  <rect width="900" height="430" fill="url(#bg3)" rx="14"/>
  <rect x="1" y="1" width="898" height="428" rx="14" fill="none" stroke="#1b2b35" stroke-width="1.5"/>
  <text x="450" y="38" text-anchor="middle" font-size="13" letter-spacing="3" fill="#5b7282">STACK, LAYER BY LAYER</text>

  <!-- Layer 1: Interface -->
  <rect x="40" y="58" width="820" height="78" rx="10" fill="url(#layer1)" stroke="#00ffc8" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="60" y="85" font-size="12.5" font-weight="700" fill="#00ffc8">01 · INTERFACE</text>
  <text x="60" y="112" font-size="13" fill="#cfe3df">React</text>
  <text x="124" y="112" font-size="13" fill="#5b7282">·</text>
  <text x="136" y="112" font-size="13" fill="#cfe3df">Next.js</text>
  <text x="208" y="112" font-size="13" fill="#5b7282">·</text>
  <text x="220" y="112" font-size="13" fill="#cfe3df">Streamlit</text>
  <text x="312" y="112" font-size="13" fill="#5b7282">·</text>
  <text x="324" y="112" font-size="13" fill="#cfe3df">TypeScript</text>
  <text x="420" y="112" font-size="13" fill="#5b7282">·</text>
  <text x="432" y="112" font-size="13" fill="#cfe3df">Tailwind CSS</text>
  <circle cx="822" cy="97" r="5" fill="#00ffc8"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>

  <!-- Layer 2: Orchestration -->
  <rect x="40" y="150" width="820" height="78" rx="10" fill="url(#layer2)" stroke="#3da9fc" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="60" y="177" font-size="12.5" font-weight="700" fill="#3da9fc">02 · ORCHESTRATION &amp; AGENTS</text>
  <text x="60" y="204" font-size="13" fill="#cfe3df">LangChain</text>
  <text x="152" y="204" font-size="13" fill="#5b7282">·</text>
  <text x="164" y="204" font-size="13" fill="#cfe3df">LangGraph</text>
  <text x="262" y="204" font-size="13" fill="#5b7282">·</text>
  <text x="274" y="204" font-size="13" fill="#cfe3df">CrewAI</text>
  <text x="346" y="204" font-size="13" fill="#5b7282">·</text>
  <text x="358" y="204" font-size="13" fill="#cfe3df">FastAPI</text>
  <text x="436" y="204" font-size="13" fill="#5b7282">·</text>
  <text x="448" y="204" font-size="13" fill="#cfe3df">Async workers</text>
  <circle cx="822" cy="189" r="5" fill="#3da9fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>

  <!-- Layer 3: Models -->
  <rect x="40" y="242" width="820" height="78" rx="10" fill="url(#layer3)" stroke="#7c5cff" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="60" y="269" font-size="12.5" font-weight="700" fill="#a98cff">03 · MODELS &amp; REASONING</text>
  <text x="60" y="296" font-size="13" fill="#dcd4f5">Claude</text>
  <text x="128" y="296" font-size="13" fill="#5b7282">·</text>
  <text x="140" y="296" font-size="13" fill="#dcd4f5">OpenAI</text>
  <text x="214" y="296" font-size="13" fill="#5b7282">·</text>
  <text x="226" y="296" font-size="13" fill="#dcd4f5">Mistral</text>
  <text x="302" y="296" font-size="13" fill="#5b7282">·</text>
  <text x="314" y="296" font-size="13" fill="#dcd4f5">DeepSeek</text>
  <text x="408" y="296" font-size="13" fill="#5b7282">·</text>
  <text x="420" y="296" font-size="13" fill="#dcd4f5">Groq inference</text>
  <circle cx="822" cy="281" r="5" fill="#7c5cff"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>

  <!-- Layer 4: Data -->
  <rect x="40" y="334" width="820" height="78" rx="10" fill="url(#layer4)" stroke="#ff9a4d" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="60" y="361" font-size="12.5" font-weight="700" fill="#ff9a4d">04 · DATA &amp; RETRIEVAL</text>
  <text x="60" y="388" font-size="13" fill="#f4ddc8">Pinecone</text>
  <text x="146" y="388" font-size="13" fill="#5b7282">·</text>
  <text x="158" y="388" font-size="13" fill="#f4ddc8">Weaviate</text>
  <text x="240" y="388" font-size="13" fill="#5b7282">·</text>
  <text x="252" y="388" font-size="13" fill="#f4ddc8">Oracle 26ai</text>
  <text x="346" y="388" font-size="13" fill="#5b7282">·</text>
  <text x="358" y="388" font-size="13" fill="#f4ddc8">PostgreSQL</text>
  <text x="454" y="388" font-size="13" fill="#5b7282">·</text>
  <text x="466" y="388" font-size="13" fill="#f4ddc8">MongoDB</text>
  <text x="556" y="388" font-size="13" fill="#5b7282">·</text>
  <text x="568" y="388" font-size="13" fill="#f4ddc8">Redis</text>
  <circle cx="822" cy="373" r="5" fill="#ff9a4d"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
</svg>
