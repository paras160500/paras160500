<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="0.55" stop-color="#0a1018"/>
      <stop offset="1" stop-color="#091a1c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00ffc8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00ffc8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffc8"/>
      <stop offset="1" stop-color="#3da9fc"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#16242b" stroke-width="1"/>
    </pattern>
    <clipPath id="winClip"><rect x="0" y="0" width="900" height="320" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#winClip)">
    <rect width="900" height="320" fill="url(#bg)"/>
    <rect width="900" height="320" fill="url(#grid)" opacity="0.5"/>
    <circle cx="760" cy="60" r="160" fill="url(#glow1)"/>
    <circle cx="120" cy="280" r="140" fill="url(#glow1)"/>

    <!-- title bar -->
    <rect x="0" y="0" width="900" height="38" fill="#0d1620"/>
    <line x1="0" y1="38" x2="900" y2="38" stroke="#1b2b35" stroke-width="1"/>
    <circle cx="24" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="46" cy="19" r="6" fill="#febc2e"/>
    <circle cx="68" cy="19" r="6" fill="#28c840"/>
    <text x="450" y="24" fill="#5b7282" font-size="13" text-anchor="middle" letter-spacing="0.5">paras@systems — zsh — 90×24</text>

    <!-- body -->
    <text x="40" y="92" font-size="15" fill="#3da9fc">paras@systems</text>
    <text x="178" y="92" font-size="15" fill="#5b7282">:</text>
    <text x="186" y="92" font-size="15" fill="#00ffc8">~</text>
    <text x="202" y="92" font-size="15" fill="#e6edf3">$ whoami</text>

    <text x="40" y="122" font-size="15" fill="#5b7282">&gt; Paras Patel · building autonomous AI since 2022</text>

    <!-- big typed line, revealed via clip animation -->
    <g>
      <clipPath id="typeClip">
        <rect x="36" y="150" height="120" width="0">
          <animate attributeName="width" from="0" to="830" begin="0.4s" dur="2.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
        </rect>
      </clipPath>
      <g clip-path="url(#typeClip)">
        <text x="40" y="178" font-size="30" font-weight="800" fill="url(#accentText)">Architecting AI that can</text>
        <text x="40" y="218" font-size="30" font-weight="800" fill="#f5f9ff">REASON · RETRIEVE · ACT</text>
        <text x="40" y="252" font-size="17" fill="#8fa3b3">— not another chatbot wrapper. Real agentic systems, shipped to prod.</text>
      </g>
      <rect x="869" y="156" width="13" height="26" fill="#00ffc8">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.39;0.4;0.7;0.71;1" dur="3.4s" repeatCount="indefinite"/>
        <animateMotion path="M0,0" begin="0.4s"/>
      </rect>
    </g>

    <text x="40" y="296" font-size="13" fill="#3a4d59">drwxr-xr-x  agentic-ai/  rag-pipelines/  llm-infra/  production-systems/</text>
  </g>
  <rect x="1" y="1" width="898" height="318" rx="14" fill="none" stroke="#1b2b35" stroke-width="1.5"/>
</svg>
