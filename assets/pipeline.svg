<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
    <linearGradient id="bg2" x1="0" y1="0" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="1" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1c24"/>
      <stop offset="1" stop-color="#0a141a"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffc8"/>
      <stop offset="1" stop-color="#3da9fc"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" fill="url(#bg2)" rx="14"/>
  <rect x="1" y="1" width="898" height="258" rx="14" fill="none" stroke="#1b2b35" stroke-width="1.5"/>

  <text x="450" y="38" text-anchor="middle" font-size="13" letter-spacing="3" fill="#5b7282">THE PIPELINE I BUILD, AGAIN AND AGAIN</text>

  <!-- connecting line -->
  <line x1="95" y1="140" x2="805" y2="140" stroke="#1b2b35" stroke-width="2"/>
  <line x1="95" y1="140" x2="805" y2="140" stroke="url(#flow)" stroke-width="2" stroke-dasharray="10 14">
    <animate attributeName="stroke-dashoffset" from="0" to="-240" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- 5 nodes -->
  <g font-size="12" font-weight="600">
    <!-- node template repeated -->
    <g>
      <circle cx="95" cy="140" r="34" fill="url(#nodeFill)" stroke="#00ffc8" stroke-width="1.6" filter="url(#softGlow)"/>
      <text x="95" y="135" text-anchor="middle" fill="#00ffc8" font-size="19">📥</text>
      <text x="95" y="195" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">INGEST</text>
      <text x="95" y="212" text-anchor="middle" fill="#5b7282" font-size="10.5">docs · APIs · streams</text>
    </g>
    <g>
      <circle cx="272" cy="140" r="34" fill="url(#nodeFill)" stroke="#3da9fc" stroke-width="1.6" filter="url(#softGlow)"/>
      <text x="272" y="135" text-anchor="middle" fill="#3da9fc" font-size="19">🧬</text>
      <text x="272" y="195" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">EMBED</text>
      <text x="272" y="212" text-anchor="middle" fill="#5b7282" font-size="10.5">vector indices</text>
    </g>
    <g>
      <circle cx="450" cy="140" r="34" fill="url(#nodeFill)" stroke="#7c5cff" stroke-width="1.6" filter="url(#softGlow)"/>
      <text x="450" y="135" text-anchor="middle" fill="#7c5cff" font-size="19">🔎</text>
      <text x="450" y="195" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">RETRIEVE</text>
      <text x="450" y="212" text-anchor="middle" fill="#5b7282" font-size="10.5">hybrid RAG</text>
    </g>
    <g>
      <circle cx="628" cy="140" r="34" fill="url(#nodeFill)" stroke="#ff6b6b" stroke-width="1.6" filter="url(#softGlow)"/>
      <text x="628" y="135" text-anchor="middle" fill="#ff6b6b" font-size="19">🧠</text>
      <text x="628" y="195" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">REASON</text>
      <text x="628" y="212" text-anchor="middle" fill="#5b7282" font-size="10.5">multi-agent LLM</text>
    </g>
    <g>
      <circle cx="805" cy="140" r="34" fill="url(#nodeFill)" stroke="#febc2e" stroke-width="1.6" filter="url(#softGlow)"/>
      <text x="805" y="135" text-anchor="middle" fill="#febc2e" font-size="19">🚀</text>
      <text x="805" y="195" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">ACT / SHIP</text>
      <text x="805" y="212" text-anchor="middle" fill="#5b7282" font-size="10.5">prod deployment</text>
    </g>
  </g>

  <text x="450" y="245" text-anchor="middle" font-size="10.5" fill="#3a4d59">every project below is one full lap of this loop</text>
</svg>
